name: Index GitHub Repositories

on:
  push:
    branches: [main]
    paths:
      - 'interview-agent/config.json'
      - 'interview-agent/indexer/**'
      - '.github/workflows/index-repos.yml'
  schedule:
    # 每周日凌晨 2:00 UTC（北京时间上午 10:00）
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: '索引模式'
        required: true
        type: choice
        default: 'incremental'
        options:
          - full
          - incremental
      repo:
        description: '只索引指定仓库（可选）'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: repository-index
  cancel-in-progress: false

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Test indexer
        run: python -m unittest discover -s interview-agent/indexer/tests -v

      - name: Run indexer
        run: |
          MODE="${{ github.event.inputs.mode || 'incremental' }}"
          REPO_ARG="${{ github.event.inputs.repo }}"

          if [ -n "$REPO_ARG" ]; then
            python interview-agent/indexer/run.py --${MODE} --repo "$REPO_ARG"
          else
            python interview-agent/indexer/run.py --${MODE}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit search index
        run: |
          if ! git diff --quiet -- interview-agent/search_index.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add interview-agent/search_index.json
            git commit -m "chore: 更新搜索索引"
            git push origin HEAD:main
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 📊 索引运行结果" >> $GITHUB_STEP_SUMMARY
          echo "- 触发方式：${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- 索引模式：${{ github.event.inputs.mode || 'incremental (定时)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 运行时间：$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 检查仓库中的 search_index.json 确认索引是否已更新。" >> $GITHUB_STEP_SUMMARY
