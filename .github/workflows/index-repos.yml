name: Index GitHub Repositories

on:
  push:
    branches: [main]
    paths:
      - 'interview-agent/config.json'
      - 'interview-agent/indexer/**'
      - '.github/scripts/ensure-vectorize-index.mjs'
      - '.github/workflows/index-repos.yml'
  schedule:
    # 每周日凌晨 2:00 UTC（北京时间上午 10:00）
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: '索引模式'
        required: true
        type: choice
        default: 'incremental'
        options:
          - full
          - incremental
      repo:
        description: '只索引指定仓库（可选）'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: repository-index
  cancel-in-progress: false

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: interview-agent/worker/package-lock.json

      - name: Install Wrangler
        working-directory: ./interview-agent/worker
        run: npm ci

      - name: Test indexer
        run: python -m unittest discover -s interview-agent/indexer/tests -v

      - name: Run indexer
        run: |
          MODE="${{ github.event.inputs.mode || 'incremental' }}"
          REPO_ARG="${{ github.event.inputs.repo }}"

          if [ -n "$REPO_ARG" ]; then
            python interview-agent/indexer/run.py --${MODE} --repo "$REPO_ARG"
          else
            python interview-agent/indexer/run.py --${MODE}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Ensure Vectorize index
        working-directory: ./interview-agent/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VECTOR_INDEX_NAME: interview-agent-index
        run: node "$GITHUB_WORKSPACE/.github/scripts/ensure-vectorize-index.mjs"

      - name: Sync Vectorize
        working-directory: ./interview-agent/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VECTOR_INDEX_NAME: interview-agent-index
        run: |
          PLAN_DIR="../indexer/_vector_plan"
          if [ -s "$PLAN_DIR/upsert.ndjson" ]; then
            npx wrangler vectorize upsert "$VECTOR_INDEX_NAME" --file="$PLAN_DIR/upsert.ndjson"
          fi
          if [ -s "$PLAN_DIR/delete-ids.txt" ]; then
            xargs -r -n 500 npx wrangler vectorize delete-vectors "$VECTOR_INDEX_NAME" --ids \
              < "$PLAN_DIR/delete-ids.txt"
          fi

      - name: Commit search index
        run: |
          git add interview-agent/search_index.json
          if [ -f interview-agent/vector_index_state.json ]; then
            git add interview-agent/vector_index_state.json
          fi
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: 更新搜索与向量索引"
            git push origin HEAD:main
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 📊 索引运行结果" >> $GITHUB_STEP_SUMMARY
          echo "- 触发方式：${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- 索引模式：${{ github.event.inputs.mode || 'incremental (定时)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 运行时间：$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 检查 search_index.json 和 vector_index_state.json 确认同步状态。" >> $GITHUB_STEP_SUMMARY
