name: Deploy Worker to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'interview-agent/worker/**'
      - 'interview-agent/config.json'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./interview-agent/worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: interview-agent/worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run lint && npm test

      - name: Ensure Vectorize index
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VECTOR_INDEX_NAME: interview-agent-index
        run: |
          if ! npx wrangler vectorize get "$VECTOR_INDEX_NAME" >/dev/null 2>&1; then
            npx wrangler vectorize create "$VECTOR_INDEX_NAME" --dimensions=1024 --metric=cosine || \
              npx wrangler vectorize get "$VECTOR_INDEX_NAME"
          fi
          if ! npx wrangler vectorize list-metadata-index "$VECTOR_INDEX_NAME" | grep -q repo; then
            npx wrangler vectorize create-metadata-index "$VECTOR_INDEX_NAME" \
              --propertyName=repo --type=string || \
              npx wrangler vectorize list-metadata-index "$VECTOR_INDEX_NAME" | grep -q repo
          fi

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: './interview-agent/worker'
          command: deploy
          secrets: |
            DEEPSEEK_API_KEY
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
