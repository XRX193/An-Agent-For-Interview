name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'interview-agent/frontend/**'
      - 'interview-agent/config.json'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

# GitHub Pages 部署权限
permissions:
  contents: read
  pages: write
  id-token: write

# 防止并发部署
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    defaults:
      run:
        working-directory: ./interview-agent/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: interview-agent/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run lint && npm test

      - name: Validate deployment configuration
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: |
          if [ -z "$VITE_API_BASE" ]; then
            echo "Repository variable VITE_API_BASE must point to the Worker /api endpoint."
            exit 1
          fi

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './interview-agent/frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
