name = "interview-agent-api"
main = "src/index.ts"
compatibility_date = "2025-07-15"
compatibility_flags = ["nodejs_compat_v2"]

# ===== 环境变量（非敏感） =====
[vars]
ENVIRONMENT = "production"

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTOR_INDEX"
index_name = "interview-agent-index"

# ===== 敏感变量通过 wrangler secret put 设置，或通过 GitHub Actions: =====
# DEEPSEEK_API_KEY    (必需，DeepSeek API 密钥)

# ===== 路由（绑定自定义域名后启用） =====
# routes = [
#   { pattern = "api.interview.example.com", custom_domain = true }
# ]

# ===== 观测性 =====
[observability]
enabled = true
head_sampling_rate = 1
