name: Index GitHub Repositories

on:
  schedule:
    # 每周日凌晨 2:00 UTC（北京时间上午 10:00）
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: '索引模式'
        required: true
        type: choice
        default: 'full'
        options:
          - full
          - incremental
      repo:
        description: '只索引指定仓库（可选）'
        required: false
        type: string

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: indexer/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r indexer/requirements.txt

      - name: Run indexer
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          REPO_ARG="${{ github.event.inputs.repo }}"

          if [ -n "$REPO_ARG" ]; then
            python indexer/run.py --${MODE} --repo "$REPO_ARG"
          else
            python indexer/run.py --${MODE}
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_USERNAME: ${{ vars.GITHUB_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## 📊 索引运行结果" >> $GITHUB_STEP_SUMMARY
          echo "- 触发方式：${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- 索引模式：${{ github.event.inputs.mode || 'full (定时)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 运行时间：$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 检查 [Supabase Dashboard](https://supabase.com/dashboard) 确认向量数据是否已更新。" >> $GITHUB_STEP_SUMMARY
